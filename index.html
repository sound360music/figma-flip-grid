<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tile Flip Grid</title>
  <style>
    :root {
      --cols: 6;
      --rows: 6;
      --tile-size: 120px;
      --gap: 2px;
      --board-size: 730px;
      --tile-bg: #161616;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    body { display: grid; place-items: center; }
    .board {
      width: var(--board-size);
      height: var(--board-size);
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--tile-size));
      grid-template-rows: repeat(var(--rows), var(--tile-size));
      gap: var(--gap);
      perspective: 1400px;
    }
    .tile {
      position: relative;
      width: var(--tile-size);
      height: var(--tile-size);
      overflow: hidden;
      background: var(--tile-bg);
      transform-style: preserve-3d;
      isolation: isolate;
    }
    .tile-card {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      will-change: transform;
    }
    .tile.is-flipping .tile-card {
      animation-name: flipY;
      animation-timing-function: cubic-bezier(0.22, 0.61, 0.36, 1);
      animation-fill-mode: both;
    }
    @keyframes flipY {
      0% { transform: rotateY(0deg); }
      49.999% { transform: rotateY(89.9deg); }
      50% { transform: rotateY(-89.9deg); }
      100% { transform: rotateY(0deg); }
    }
    .face {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: translateZ(0.1px);
    }
    .loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.18);
      font-size: 14px;
      letter-spacing: 0.04em;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading" class="loading">images loading...</div>
  <div class="board" id="board"></div>

  <script>
    const CONFIG = {
      cols: 6,
      rows: 6,
      totalTiles: 36,
      minRefreshDelay: 2000,
      maxRefreshDelay: 5000,
      minTilesPerRefresh: 1,
      maxTilesPerRefresh: 3,
      minFlipDuration: 300,
      maxFlipDuration: 600,
      imagePool: [
        './images/01.jpg',
        './images/02.jpeg',
        './images/03.png'
      ]
    };

    const board = document.getElementById('board');
    const loading = document.getElementById('loading');
    const tiles = [];

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function preloadImages(urls) {
      return Promise.all(urls.map(url => new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve({ url, ok: true });
        img.onerror = () => resolve({ url, ok: false });
        img.src = url;
      })));
    }

    function createTile(src) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      const card = document.createElement('div');
      card.className = 'tile-card';
      const face = document.createElement('div');
      face.className = 'face';
      face.style.backgroundImage = `url("${src}")`;
      card.append(face);
      tile.append(card);
      board.append(tile);
      tiles.push({ tile, card, face, src, flipping: false });
    }

    function activeImageSet(excludeIndexes = []) {
      const skip = new Set(excludeIndexes);
      return new Set(tiles.filter((_, i) => !skip.has(i)).map(t => t.src));
    }

    function pickReplacement(excludeSet) {
      const candidates = CONFIG.imagePool.filter(src => !excludeSet.has(src));
      if (!candidates.length) return null;
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function flipTo(tileState, nextSrc, duration) {
      if (tileState.flipping || tileState.src === nextSrc) return;
      tileState.flipping = true;
      tileState.card.style.animationDuration = `${duration}ms`;
      tileState.tile.classList.add('is-flipping');
      window.setTimeout(() => {
        tileState.face.style.backgroundImage = `url("${nextSrc}")`;
        tileState.src = nextSrc;
      }, duration / 2);
      window.setTimeout(() => {
        tileState.tile.classList.remove('is-flipping');
        tileState.flipping = false;
      }, duration + 20);
    }

    function scheduleNext() {
      const delay = randomInt(CONFIG.minRefreshDelay, CONFIG.maxRefreshDelay);
      window.setTimeout(refreshTiles, delay);
    }

    function refreshTiles() {
      const changeCount = randomInt(CONFIG.minTilesPerRefresh, CONFIG.maxTilesPerRefresh);
      const indexes = shuffle([...Array(tiles.length).keys()]).slice(0, changeCount);
      const baseActive = activeImageSet(indexes);
      const picked = new Set();

      indexes.forEach(index => {
        const nextSrc = pickReplacement(new Set([...baseActive, ...picked]));
        if (!nextSrc) return;
        picked.add(nextSrc);
        flipTo(tiles[index], nextSrc, randomInt(CONFIG.minFlipDuration, CONFIG.maxFlipDuration));
      });

      scheduleNext();
    }

    async function init() {
      const loaded = await preloadImages(CONFIG.imagePool);
      CONFIG.imagePool = loaded.filter(item => item.ok).map(item => item.url);

      if (CONFIG.imagePool.length < CONFIG.totalTiles) {
        loading.textContent = `테스트용 이미지 ${CONFIG.imagePool.length}장 로드됨. 실전에서는 최소 36장 이상 필요합니다.`;
      }

      const starter = shuffle(CONFIG.imagePool);
      for (let i = 0; i < CONFIG.totalTiles; i++) {
        createTile(starter[i % starter.length]);
      }

      loading.classList.add('hidden');
      scheduleNext();
    }

    init();
  </script>
</body>
</html>
