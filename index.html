<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tile Flip Grid – Infinite Scroll</title>
  <style>
    :root {
      --cols: 6;
      --rows: 6;
      --tile-size: 120px;
      --gap: 2px;
      --board-size: 730px;
      --tile-bg: transparent;
      --radius: 2px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    /* 보이는 창 */
    .viewport {
      width: var(--board-size);
      height: var(--board-size);
      overflow: hidden;
      position: relative;
    }

    /* 보드 여러 개를 세로로 쌓는 컨테이너 */
    .strip {
      display: flex;
      flex-direction: column;
      animation-name: scrollUp;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      animation-duration: 72s;
    }

    @keyframes scrollUp {
      0%   { transform: translateY(0); }
      100% { transform: translateY(calc(-1 * var(--board-size))); }
    }

    /* 6×6 보드 한 판 */
    .board {
      width: var(--board-size);
      height: var(--board-size);
      flex-shrink: 0;
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--tile-size));
      grid-template-rows: repeat(var(--rows), var(--tile-size));
      gap: var(--gap);
      perspective: 1400px;
    }

    .tile {
      position: relative;
      width: var(--tile-size);
      height: var(--tile-size);
      background: var(--tile-bg);
      border-radius: var(--radius);
      overflow: hidden;
      transform-style: preserve-3d;
      isolation: isolate;
    }

    .tile-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .face {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: translateZ(0.1px);
      border-radius: var(--radius);
    }

    .face.current { z-index: 1; }
    .face.next    { z-index: 2; opacity: 0; }

    .loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.18);
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    .hidden { display: none; }

    /* ============ 전환 애니메이션 ============ */

    /* Y축 플립 */
    .anim-flip-y .tile-inner {
      animation-name: flipY;
      animation-timing-function: cubic-bezier(0.22, 0.61, 0.36, 1);
      animation-fill-mode: both;
    }
    @keyframes flipY {
      0%    { transform: rotateY(0deg); }
      49.9% { transform: rotateY(90deg); }
      50%   { transform: rotateY(-90deg); }
      100%  { transform: rotateY(0deg); }
    }

    /* X축 플립 */
    .anim-flip-x .tile-inner {
      animation-name: flipX;
      animation-timing-function: cubic-bezier(0.22, 0.61, 0.36, 1);
      animation-fill-mode: both;
    }
    @keyframes flipX {
      0%    { transform: rotateX(0deg); }
      49.9% { transform: rotateX(90deg); }
      50%   { transform: rotateX(-90deg); }
      100%  { transform: rotateX(0deg); }
    }

    /* 슬라이드 공통 – next 항상 보이게 */
    .anim-slide-up .face.next,
    .anim-slide-down .face.next,
    .anim-slide-left .face.next,
    .anim-slide-right .face.next { opacity: 1; }

    /* 위 */
    .anim-slide-up .face.current {
      animation-name: slideCurrentUp; animation-fill-mode: both;
    }
    .anim-slide-up .face.next {
      animation-name: slideNextUp; animation-fill-mode: both;
    }
    @keyframes slideCurrentUp {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-100%); }
    }
    @keyframes slideNextUp {
      0%   { transform: translateY(100%); }
      100% { transform: translateY(0); }
    }

    /* 아래 */
    .anim-slide-down .face.current {
      animation-name: slideCurrentDown; animation-fill-mode: both;
    }
    .anim-slide-down .face.next {
      animation-name: slideNextDown; animation-fill-mode: both;
    }
    @keyframes slideCurrentDown {
      0%   { transform: translateY(0); }
      100% { transform: translateY(100%); }
    }
    @keyframes slideNextDown {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(0); }
    }

    /* 왼쪽 */
    .anim-slide-left .face.current {
      animation-name: slideCurrentLeft; animation-fill-mode: both;
    }
    .anim-slide-left .face.next {
      animation-name: slideNextLeft; animation-fill-mode: both;
    }
    @keyframes slideCurrentLeft {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
    @keyframes slideNextLeft {
      0%   { transform: translateX(100%); }
      100% { transform: translateX(0); }
    }

    /* 오른쪽 */
    .anim-slide-right .face.current {
      animation-name: slideCurrentRight; animation-fill-mode: both;
    }
    .anim-slide-right .face.next {
      animation-name: slideNextRight; animation-fill-mode: both;
    }
    @keyframes slideCurrentRight {
      0%   { transform: translateX(0); }
      100% { transform: translateX(100%); }
    }
    @keyframes slideNextRight {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(0); }
    }

    /* 블러 디졸브 */
    .anim-dissolve .face.current {
      animation-name: dissolveOut; animation-fill-mode: both;
    }
    .anim-dissolve .face.next {
      opacity: 1;
      animation-name: dissolveIn; animation-fill-mode: both;
    }
    @keyframes dissolveOut {
      0%   { opacity: 1; filter: blur(0px); }
      100% { opacity: 0; filter: blur(6px); }
    }
    @keyframes dissolveIn {
      0%   { opacity: 0; filter: blur(6px); }
      100% { opacity: 1; filter: blur(0px); }
    }

  </style>
</head>
<body>
  <div id="loading" class="loading">images loading...</div>
  <div class="viewport">
    <div class="strip" id="strip"></div>
  </div>

  <script>
    const CONFIG = {
      cols: 6,
      rows: 6,
      tilesPerBoard: 36,
      boardCount: 3,           // 세로로 이어 붙일 보드 개수 (3개면 충분히 끊김 없음)
      minRefreshDelay: 2000,
      maxRefreshDelay: 5000,
      minTilesPerRefresh: 1,
      maxTilesPerRefresh: 3,
      minAnimDuration: 300,
      maxAnimDuration: 600,
      minIndex: 1,
      maxIndex: 99,
      exts: ['jpg', 'jpeg', 'png', 'gif'],
      basePath: './images'
    };

    const stripEl   = document.getElementById('strip');
    const loadingEl = document.getElementById('loading');
    const tiles     = [];

    const TRANSITIONS = [
      'anim-flip-x',
      'anim-flip-y',
      'anim-slide-up',
      'anim-slide-down',
      'anim-slide-left',
      'anim-slide-right',
      'anim-dissolve'
    ];

    function pad2(n) {
      return String(n).padStart(2, '0');
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function buildCandidateUrls() {
      const urls = [];
      for (let i = CONFIG.minIndex; i <= CONFIG.maxIndex; i++) {
        const index = pad2(i);
        for (const ext of CONFIG.exts) {
          urls.push(`${CONFIG.basePath}/${index}.${ext}`);
        }
      }
      return urls;
    }

    function preloadImages(urls) {
      return Promise.all(
        urls.map(url =>
          new Promise(resolve => {
            const img = new Image();
            img.onload  = () => resolve({ url, ok: true  });
            img.onerror = () => resolve({ url, ok: false });
            img.src = url;
          })
        )
      );
    }

    function createTile(boardEl, initialSrc) {
      const tile = document.createElement('div');
      tile.className = 'tile';

      const inner = document.createElement('div');
      inner.className = 'tile-inner';

      const current = document.createElement('div');
      current.className = 'face current';
      current.style.backgroundImage = `url("${initialSrc}")`;

      const next = document.createElement('div');
      next.className = 'face next';

      inner.append(current, next);
      tile.append(inner);
      boardEl.append(tile);

      tiles.push({
        tile, inner, current, next,
        src: initialSrc,
        animClass: null,
        running: false
      });
    }

    function activeImageSet(excludeIndexes = []) {
      const skip = new Set(excludeIndexes);
      return new Set(tiles.filter((_, i) => !skip.has(i)).map(t => t.src));
    }

    function pickReplacement(pool, excludeSet) {
      const candidates = pool.filter(src => !excludeSet.has(src));
      if (!candidates.length) return null;
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function pickRandomTransition() {
      return TRANSITIONS[Math.floor(Math.random() * TRANSITIONS.length)];
    }

    function applyTransition(tileState, nextSrc, duration) {
      if (tileState.running || tileState.src === nextSrc) return;

      tileState.running = true;
      tileState.next.style.backgroundImage = `url("${nextSrc}")`;
      tileState.next.style.opacity = '1';

      if (tileState.animClass) {
        tileState.tile.classList.remove(tileState.animClass);
      }

      const transitionClass = pickRandomTransition();
      tileState.animClass   = transitionClass;

      tileState.inner.style.animationDuration   = `${duration}ms`;
      tileState.current.style.animationDuration = `${duration}ms`;
      tileState.next.style.animationDuration    = `${duration}ms`;

      tileState.tile.classList.add(transitionClass);

      const midTimeout = window.setTimeout(() => {
        tileState.current.style.backgroundImage = `url("${nextSrc}")`;
        tileState.src = nextSrc;
      }, duration / 2);

      window.setTimeout(() => {
        tileState.tile.classList.remove(transitionClass);
        tileState.running  = false;
        tileState.next.style.opacity = '0';
        tileState.inner.style.animationDuration   = '';
        tileState.current.style.animationDuration = '';
        tileState.next.style.animationDuration    = '';
        window.clearTimeout(midTimeout);
      }, duration + 30);
    }

    function scheduleNext(pool) {
      const delay = randomInt(CONFIG.minRefreshDelay, CONFIG.maxRefreshDelay);
      window.setTimeout(() => refreshTiles(pool), delay);
    }

    function refreshTiles(pool) {
      if (!pool.length) { scheduleNext(pool); return; }

      const changeCount = randomInt(CONFIG.minTilesPerRefresh, CONFIG.maxTilesPerRefresh);
      const indexes     = shuffle([...Array(tiles.length).keys()]).slice(0, changeCount);
      const baseActive  = activeImageSet(indexes);
      const picked      = new Set();

      indexes.forEach(index => {
        const nextSrc = pickReplacement(pool, new Set([...baseActive, ...picked]));
        if (!nextSrc) return;
        picked.add(nextSrc);
        const duration = randomInt(CONFIG.minAnimDuration, CONFIG.maxAnimDuration);
        applyTransition(tiles[index], nextSrc, duration);
      });

      scheduleNext(pool);
    }

    async function init() {
      const candidates = buildCandidateUrls();
      const loaded     = await preloadImages(candidates);
      const pool       = loaded.filter(item => item.ok).map(item => item.url);

      if (!pool.length) {
        loadingEl.textContent =
          '이미지를 찾을 수 없습니다. images/01~99.(jpg/jpeg/png/gif)을 확인해 주세요.';
        return;
      }

      const totalTiles = CONFIG.tilesPerBoard * CONFIG.boardCount;

      if (pool.length < CONFIG.tilesPerBoard) {
        loadingEl.textContent =
          `사용 가능한 이미지 ${pool.length}장. 일부 타일은 반복 사용됩니다.`;
      }

      const starter = shuffle(pool);

      for (let b = 0; b < CONFIG.boardCount; b++) {
        const board = document.createElement('div');
        board.className = 'board';
        stripEl.append(board);

        for (let i = 0; i < CONFIG.tilesPerBoard; i++) {
          const src = starter[(b * CONFIG.tilesPerBoard + i) % starter.length];
          createTile(board, src);
        }
      }

      loadingEl.classList.add('hidden');
      scheduleNext(pool);
    }

    init();
  </script>
</body>
</html>
