<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tile Flip Grid</title>
  <style>
    :root {
      --cols: 6;
      --rows: 6;
      --tile-size: 120px;
      --gap: 2px;
      --board-size: 730px;
      --bg: #111111;
      --tile-bg: #1a1a1a;
      --radius: 0px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .board {
      width: var(--board-size);
      height: var(--board-size);
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--tile-size));
      grid-template-rows: repeat(var(--rows), var(--tile-size));
      gap: var(--gap);
      perspective: 1200px;
      background: transparent;
    }

    .tile {
      position: relative;
      width: var(--tile-size);
      height: var(--tile-size);
      transform-style: preserve-3d;
      perspective: 1000px;
      overflow: hidden;
      background: var(--tile-bg);
      border-radius: var(--radius);
    }

    .tile-card {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    .tile.is-flipping .tile-card {
      animation-name: flipY;
      animation-timing-function: cubic-bezier(0.22, 0.61, 0.36, 1);
      animation-fill-mode: both;
    }

    @keyframes flipY {
      0% { transform: rotateY(0deg); }
      50% { transform: rotateY(90deg); }
      100% { transform: rotateY(0deg); }
    }

    .face {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: translateZ(0);
    }

    .face.current { z-index: 1; }
    .face.next { z-index: 2; opacity: 0; }

    .loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,0.05);
      color: #666;
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading" class="loading">images loading...</div>
  <div class="board" id="board" aria-label="랜덤 이미지 플립 그리드"></div>

  <script>
    const CONFIG = {
      cols: 6,
      rows: 6,
      tileSize: 120,
      gap: 2,
      totalTiles: 36,
      minRefreshDelay: 2000,
      maxRefreshDelay: 5000,
      minTilesPerRefresh: 1,
      maxTilesPerRefresh: 3,
      minFlipDuration: 300,
      maxFlipDuration: 600,
      imageCount: 48,
      imagePath: './images',
      imageExt: 'jpg',
      filePad: 2
    };

    const board = document.getElementById('board');
    const loading = document.getElementById('loading');
    const activeImages = new Map();
    const tiles = [];

    function padNumber(num, size) {
      return String(num).padStart(size, '0');
    }

    function buildImageList() {
      return Array.from({ length: CONFIG.imageCount }, (_, i) => {
        const index = padNumber(i + 1, CONFIG.filePad);
        return `${CONFIG.imagePath}/${index}.${CONFIG.imageExt}`;
      });
    }

    const imagePool = buildImageList();

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function preloadImages(urls) {
      return Promise.all(urls.map(url => new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve({ url, ok: true });
        img.onerror = () => resolve({ url, ok: false });
        img.src = url;
      })));
    }

    function pickUnusedImage(excludeSet) {
      const candidates = imagePool.filter(src => !excludeSet.has(src));
      if (!candidates.length) return null;
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function createTile(initialSrc, index) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.index = index;

      const card = document.createElement('div');
      card.className = 'tile-card';

      const current = document.createElement('div');
      current.className = 'face current';
      current.style.backgroundImage = `url("${initialSrc}")`;

      const next = document.createElement('div');
      next.className = 'face next';

      card.append(current, next);
      tile.append(card);
      board.append(tile);

      const state = { tile, card, current, next, src: initialSrc, flipping: false };
      activeImages.set(index, initialSrc);
      tiles.push(state);
    }

    function getActiveSet(skipIndexes = []) {
      const skip = new Set(skipIndexes);
      const set = new Set();
      tiles.forEach((tile, idx) => {
        if (!skip.has(idx)) set.add(tile.src);
      });
      return set;
    }

    function flipTile(tileState, newSrc, duration) {
      if (tileState.flipping || tileState.src === newSrc) return;
      tileState.flipping = true;
      tileState.next.style.backgroundImage = `url("${newSrc}")`;
      tileState.next.style.opacity = '0';
      tileState.card.style.animationDuration = `${duration}ms`;
      tileState.tile.classList.add('is-flipping');

      const halfway = duration / 2;
      const midSwap = window.setTimeout(() => {
        tileState.current.style.backgroundImage = `url("${newSrc}")`;
        tileState.next.style.opacity = '1';
      }, halfway * 0.98);

      const done = window.setTimeout(() => {
        tileState.tile.classList.remove('is-flipping');
        tileState.next.style.opacity = '0';
        tileState.src = newSrc;
        tileState.flipping = false;
        window.clearTimeout(midSwap);
      }, duration + 20);

      return () => {
        window.clearTimeout(midSwap);
        window.clearTimeout(done);
      };
    }

    function scheduleNextRefresh() {
      const delay = randomInt(CONFIG.minRefreshDelay, CONFIG.maxRefreshDelay);
      window.setTimeout(runRefreshCycle, delay);
    }

    function runRefreshCycle() {
      const count = randomInt(CONFIG.minTilesPerRefresh, CONFIG.maxTilesPerRefresh);
      const availableTileIndexes = shuffle([...Array(tiles.length).keys()]);
      const selectedIndexes = availableTileIndexes.slice(0, count);
      const activeExcludingTargets = getActiveSet(selectedIndexes);
      const pickedNewImages = new Set();

      selectedIndexes.forEach(index => {
        const tileState = tiles[index];
        const excludeSet = new Set([...activeExcludingTargets, ...pickedNewImages]);
        const newSrc = pickUnusedImage(excludeSet);
        if (!newSrc) return;
        pickedNewImages.add(newSrc);
        const duration = randomInt(CONFIG.minFlipDuration, CONFIG.maxFlipDuration);
        flipTile(tileState, newSrc, duration);
      });

      scheduleNextRefresh();
    }

    async function init() {
      const preload = await preloadImages(imagePool);
      const validImages = preload.filter(item => item.ok).map(item => item.url);

      if (validImages.length < CONFIG.totalTiles) {
        loading.textContent = `이미지가 ${CONFIG.totalTiles}장 이상 필요합니다. 현재 로드 가능: ${validImages.length}장`;
        return;
      }

      imagePool.length = 0;
      imagePool.push(...validImages);

      const initialImages = shuffle(validImages).slice(0, CONFIG.totalTiles);
      initialImages.forEach((src, idx) => createTile(src, idx));

      loading.classList.add('hidden');
      scheduleNextRefresh();
    }

    init();
  </script>
</body>
</html>
