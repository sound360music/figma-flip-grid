<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tile Flip Grid – Infinite Scroll</title>
  <style>
    :root {
      --cols: 6;
      --rows: 6;
      --tile-size: 148px;
      --gap: 2px;
      --board-size: 898px;
      --tile-bg: transparent;
      --radius: 2px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body { display: grid; place-items: center; }

    .viewport {
      width: var(--board-size);
      height: var(--board-size);
      overflow: hidden;
      position: relative;
    }

    .strip {
      display: flex;
      flex-direction: column;
      gap: 2px;
      animation: scrollUp 79.2s linear infinite;
    }

    @keyframes scrollUp {
      0%   { transform: translateY(0); }
      100% { transform: translateY(calc(-1 * var(--board-size))); }
    }

    .board {
      width: var(--board-size);
      height: var(--board-size);
      flex-shrink: 0;
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--tile-size));
      grid-template-rows: repeat(var(--rows), var(--tile-size));
      gap: var(--gap);
      perspective: 1400px;
      position: relative;
    }

    .tile {
      position: relative;
      width: var(--tile-size);
      height: var(--tile-size);
      background: var(--tile-bg);
      border-radius: var(--radius);
      overflow: hidden;
      transform-style: preserve-3d;
      isolation: isolate;
    }

    .tile-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      will-change: transform;
      animation-duration: var(--tile-anim-dur, 500ms);
    }

    .face {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: translateZ(0.1px);
      border-radius: var(--radius);
      animation-duration: var(--tile-anim-dur, 500ms);
    }

    .face.current { z-index: 1; }
    .face.next    { z-index: 2; opacity: 0; }

    .big-tile {
      position: absolute;
      z-index: 100;
      border-radius: var(--radius);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .big-tile.visible { opacity: 1; }

    .loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.18);
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    .hidden { display: none; }

    .anim-flip-y .tile-inner {
      animation-name: flipY;
      animation-timing-function: cubic-bezier(0.22, 0.61, 0.36, 1);
      animation-fill-mode: both;
    }
    @keyframes flipY {
      0%    { transform: rotateY(0deg); }
      49.9% { transform: rotateY(90deg); }
      50%   { transform: rotateY(-90deg); }
      100%  { transform: rotateY(0deg); }
    }

    .anim-flip-x .tile-inner {
      animation-name: flipX;
      animation-timing-function: cubic-bezier(0.22, 0.61, 0.36, 1);
      animation-fill-mode: both;
    }
    @keyframes flipX {
      0%    { transform: rotateX(0deg); }
      49.9% { transform: rotateX(90deg); }
      50%   { transform: rotateX(-90deg); }
      100%  { transform: rotateX(0deg); }
    }

    .anim-slide-up .face.next,
    .anim-slide-down .face.next,
    .anim-slide-left .face.next,
    .anim-slide-right .face.next { opacity: 1; }

    .anim-slide-up .face.current {
      animation-name: slideCurrentUp; animation-fill-mode: both;
    }
    .anim-slide-up .face.next {
      animation-name: slideNextUp; animation-fill-mode: both;
    }
    @keyframes slideCurrentUp {
      0% { transform: translateY(0); } 100% { transform: translateY(-100%); }
    }
    @keyframes slideNextUp {
      0% { transform: translateY(100%); } 100% { transform: translateY(0); }
    }

    .anim-slide-down .face.current {
      animation-name: slideCurrentDown; animation-fill-mode: both;
    }
    .anim-slide-down .face.next {
      animation-name: slideNextDown; animation-fill-mode: both;
    }
    @keyframes slideCurrentDown {
      0% { transform: translateY(0); } 100% { transform: translateY(100%); }
    }
    @keyframes slideNextDown {
      0% { transform: translateY(-100%); } 100% { transform: translateY(0); }
    }

    .anim-slide-left .face.current {
      animation-name: slideCurrentLeft; animation-fill-mode: both;
    }
    .anim-slide-left .face.next {
      animation-name: slideNextLeft; animation-fill-mode: both;
    }
    @keyframes slideCurrentLeft {
      0% { transform: translateX(0); } 100% { transform: translateX(-100%); }
    }
    @keyframes slideNextLeft {
      0% { transform: translateX(100%); } 100% { transform: translateX(0); }
    }

    .anim-slide-right .face.current {
      animation-name: slideCurrentRight; animation-fill-mode: both;
    }
    .anim-slide-right .face.next {
      animation-name: slideNextRight; animation-fill-mode: both;
    }
    @keyframes slideCurrentRight {
      0% { transform: translateX(0); } 100% { transform: translateX(100%); }
    }
    @keyframes slideNextRight {
      0% { transform: translateX(-100%); } 100% { transform: translateX(0); }
    }

    .anim-dissolve .face.current {
      animation-name: dissolveOut; animation-fill-mode: both;
    }
    .anim-dissolve .face.next {
      opacity: 1;
      animation-name: dissolveIn; animation-fill-mode: both;
    }
    @keyframes dissolveOut {
      0%   { opacity: 1; filter: blur(0px); }
      100% { opacity: 0; filter: blur(6px); }
    }
    @keyframes dissolveIn {
      0%   { opacity: 0; filter: blur(6px); }
      100% { opacity: 1; filter: blur(0px); }
    }

  </style>
</head>
<body>
  <div id="loading" class="loading">images loading...</div>
  <div class="viewport">
    <div class="strip" id="strip"></div>
  </div>

  <script>
    const CONFIG = {
      cols: 6,
      rows: 6,
      tilesPerBoard: 36,
      boardCount: 2,
      minRefreshDelay: 1800,
      maxRefreshDelay: 4500,
      minTilesPerRefresh: 1,
      maxTilesPerRefresh: 3,
      minAnimDuration: 300,
      maxAnimDuration: 600,
      minIndex: 1,
      maxIndex: 99,
      exts: ['jpg', 'jpeg', 'png', 'gif'],
      basePath: './images',
      bigTile: {
        minInterval: 40000,   // 40s ~ 60s 간격으로 더 자주 등장
        maxInterval: 60000,
        minDisplay:  20000,   // 20s ~ 40s 동안 더 오래 유지
        maxDisplay:  40000,
      }
    };

    const TRANSITIONS = [
      'anim-flip-x', 'anim-flip-y',
      'anim-slide-up', 'anim-slide-down',
      'anim-slide-left', 'anim-slide-right',
      'anim-dissolve'
    ];

    const TILE_SIZE = 148;
    const GAP       = 2;

    const stripEl   = document.getElementById('strip');
    const loadingEl = document.getElementById('loading');
    const tiles     = [];
    const boards    = [];
    const activeBig = [null, null];

    function pad2(n) { return String(n).padStart(2, '0'); }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function buildCandidateUrls() {
      const urls = [];
      for (let i = CONFIG.minIndex; i <= CONFIG.maxIndex; i++) {
        const idx = pad2(i);
        for (const ext of CONFIG.exts) {
          urls.push(`${CONFIG.basePath}/${idx}.${ext}`);
        }
      }
      return urls;
    }

    function preloadImages(urls) {
      return Promise.all(
        urls.map(url =>
          new Promise(resolve => {
            const img = new Image();
            img.onload  = () => resolve({ url, ok: true  });
            img.onerror = () => resolve({ url, ok: false });
            img.src = url;
          })
        )
      );
    }

    function createTile(boardEl, initialSrc, boardIdx) {
      const tile  = document.createElement('div');
      tile.className = 'tile';

      const inner = document.createElement('div');
      inner.className = 'tile-inner';

      const current = document.createElement('div');
      current.className = 'face current';
      current.style.backgroundImage = `url("${initialSrc}")`;

      const next = document.createElement('div');
      next.className = 'face next';

      inner.append(current, next);
      tile.append(inner);
      boardEl.append(tile);

      tiles.push({
        tile, inner, current, next,
        src: initialSrc,
        animClass: null,
        running: false,
        boardIdx
      });
    }

    function activeImageSet(excludeIndexes = []) {
      const skip = new Set(excludeIndexes);
      return new Set(tiles.filter((_, i) => !skip.has(i)).map(t => t.src));
    }

    function pickReplacement(pool, excludeSet) {
      const candidates = pool.filter(src => !excludeSet.has(src));
      if (!candidates.length) return null;
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function pickRandomTransition() {
      return TRANSITIONS[Math.floor(Math.random() * TRANSITIONS.length)];
    }

    function applyTransition(tileState, nextSrc, duration) {
      if (tileState.running || tileState.src === nextSrc) return;

      tileState.running = true;
      tileState.tile.style.setProperty('--tile-anim-dur', `${duration}ms`);
      tileState.next.style.backgroundImage = `url("${nextSrc}")`;
      tileState.next.style.opacity = '1';

      if (tileState.animClass) {
        tileState.tile.classList.remove(tileState.animClass);
        void tileState.tile.offsetWidth;
      }

      const cls = pickRandomTransition();
      tileState.animClass = cls;
      tileState.tile.classList.add(cls);

      window.setTimeout(() => {
        tileState.current.style.backgroundImage = `url("${nextSrc}")`;
        tileState.src = nextSrc;
      }, duration / 2);

      window.setTimeout(() => {
        tileState.tile.classList.remove(cls);
        tileState.animClass = null;
        tileState.running   = false;
        tileState.next.style.opacity = '0';
      }, duration + 30);
    }

    function scheduleNext(pool) {
      const delay = randomInt(CONFIG.minRefreshDelay, CONFIG.maxRefreshDelay);
      window.setTimeout(() => refreshTiles(pool), delay);
    }

    function refreshTiles(pool) {
      if (!pool.length) { scheduleNext(pool); return; }

      const changeCount = randomInt(CONFIG.minTilesPerRefresh, CONFIG.maxTilesPerRefresh);
      const indexes     = shuffle([...Array(tiles.length).keys()]).slice(0, changeCount);
      const baseActive  = activeImageSet(indexes);
      const picked      = new Set();

      indexes.forEach(index => {
        const nextSrc = pickReplacement(pool, new Set([...baseActive, ...picked]));
        if (!nextSrc) return;
        picked.add(nextSrc);
        const duration = randomInt(CONFIG.minAnimDuration, CONFIG.maxAnimDuration);
        applyTransition(tiles[index], nextSrc, duration);
      });

      scheduleNext(pool);
    }

    function getAllBigPositions() {
      const positions = [];
      for (let r = 0; r <= CONFIG.rows - 2; r++) {
        for (let c = 0; c <= CONFIG.cols - 2; c++) {
          positions.push({ col: c, row: r });
        }
      }
      return positions;
    }

    function showBigTile(boardIdx, pool) {
      if (activeBig[boardIdx]) return;

      const boardEl = boards[boardIdx];
      const positions = shuffle(getAllBigPositions());
      const pos = positions[0];

      const currentSrcs = new Set(tiles.filter(t => t.boardIdx === boardIdx).map(t => t.src));
      const src = pickReplacement(pool, currentSrcs) || pool[randomInt(0, pool.length - 1)];

      const el = document.createElement('div');
      el.className = 'big-tile';

      const size = TILE_SIZE * 2 + GAP;
      const left = pos.col * (TILE_SIZE + GAP);
      const top  = pos.row * (TILE_SIZE + GAP);

      el.style.width  = `${size}px`;
      el.style.height = `${size}px`;
      el.style.left   = `${left}px`;
      el.style.top    = `${top}px`;
      el.style.backgroundImage = `url("${src}")`;

      boardEl.appendChild(el);
      activeBig[boardIdx] = { el, col: pos.col, row: pos.row };

      requestAnimationFrame(() => {
        requestAnimationFrame(() => { el.classList.add('visible'); });
      });

      const displayDuration = randomInt(CONFIG.bigTile.minDisplay, CONFIG.bigTile.maxDisplay);
      window.setTimeout(() => hideBigTile(boardIdx, pool), displayDuration);
    }

    function hideBigTile(boardIdx, pool) {
      const big = activeBig[boardIdx];
      if (!big) return;

      big.el.classList.remove('visible');

      window.setTimeout(() => {
        if (big.el.parentNode) big.el.parentNode.removeChild(big.el);
        activeBig[boardIdx] = null;
      }, 700);

      scheduleBigTile(boardIdx, pool);
    }

    function scheduleBigTile(boardIdx, pool) {
      const delay = randomInt(CONFIG.bigTile.minInterval, CONFIG.bigTile.maxInterval);
      window.setTimeout(() => showBigTile(boardIdx, pool), delay);
    }

    async function init() {
      const candidates = buildCandidateUrls();
      const loaded     = await preloadImages(candidates);
      const pool       = loaded.filter(item => item.ok).map(item => item.url);

      if (!pool.length) {
        loadingEl.textContent = '이미지를 찾을 수 없습니다. images/01~99.(jpg/jpeg/png/gif)을 확인해 주세요.';
        return;
      }

      if (pool.length < CONFIG.tilesPerBoard) {
        loadingEl.textContent = `사용 가능한 이미지 ${pool.length}장. 일부 타일은 반복 사용됩니다.`;
      }

      const starter = shuffle(pool);

      for (let b = 0; b < CONFIG.boardCount; b++) {
        const board = document.createElement('div');
        board.className = 'board';
        stripEl.append(board);
        boards.push(board);

        for (let i = 0; i < CONFIG.tilesPerBoard; i++) {
          const src = starter[i % starter.length];
          createTile(board, src, b);
        }
      }

      loadingEl.classList.add('hidden');

      scheduleNext(pool);

      for (let b = 0; b < CONFIG.boardCount; b++) {
        const initialDelay = randomInt(CONFIG.bigTile.minInterval, CONFIG.bigTile.maxInterval);
        window.setTimeout(() => showBigTile(b, pool), initialDelay);
      }
    }

    init();
  </script>
</body>
</html>
