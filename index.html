<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tile Flip Grid</title>
  <style>
    :root {
      --cols: 6;
      --rows: 6;
      --tile-size: 120px;
      --gap: 2px;
      --board-size: 730px;
      --tile-bg: #161616;
      --radius: 2px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    body { display: grid; place-items: center; }
    .board {
      width: var(--board-size);
      height: var(--board-size);
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--tile-size));
      grid-template-rows: repeat(var(--rows), var(--tile-size));
      gap: var(--gap);
      perspective: 1400px;
    }
    .tile {
      position: relative;
      width: var(--tile-size);
      height: var(--tile-size);
      overflow: hidden;
      background: var(--tile-bg);
      transform-style: preserve-3d;
      isolation: isolate;
      border-radius: var(--radius);
    }
    .tile-card {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      will-change: transform;
    }
    .tile.is-flipping .tile-card {
      animation-name: flipY;
      animation-timing-function: cubic-bezier(0.22, 0.61, 0.36, 1);
      animation-fill-mode: both;
    }
    @keyframes flipY {
      0% { transform: rotateY(0deg); }
      49.999% { transform: rotateY(89.9deg); }
      50% { transform: rotateY(-89.9deg); }
      100% { transform: rotateY(0deg); }
    }
    .face {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: translateZ(0.1px);
      border-radius: var(--radius);
    }
    .loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.18);
      font-size: 14px;
      letter-spacing: 0.04em;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading" class="loading">images loading...</div>
  <div class="board" id="board"></div>

  <script>
    const CONFIG = {
      cols: 6,
      rows: 6,
      totalTiles: 36,
      minRefreshDelay: 2000,
      maxRefreshDelay: 5000,
      minTilesPerRefresh: 1,
      maxTilesPerRefresh: 3,
      minFlipDuration: 300,
      maxFlipDuration: 600,
      // 01 ~ 99까지 탐색
      minIndex: 1,
      maxIndex: 99,
      // 허용 확장자 (소문자로 비교)
      exts: ['jpg', 'jpeg', 'png', 'gif'],
      // 기본 폴더
      basePath: './images'
    };

    const board = document.getElementById('board');
    const loading = document.getElementById('loading');
    const tiles = [];

    function pad2(n) {
      return String(n).padStart(2, '0');
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // 01~99, jpg/jpeg/png/gif 조합을 모두 만들어서 preload
    function buildCandidateUrls() {
      const urls = [];
      for (let i = CONFIG.minIndex; i <= CONFIG.maxIndex; i++) {
        const index = pad2(i);
        for (const ext of CONFIG.exts) {
          urls.push(`${CONFIG.basePath}/${index}.${ext}`);
        }
      }
      return urls;
    }

    function preloadImages(urls) {
      return Promise.all(urls.map(url => new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve({ url, ok: true });
        img.onerror = () => resolve({ url, ok: false });
        img.src = url;
      })));
    }

    function createTile(src) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      const card = document.createElement('div');
      card.className = 'tile-card';
      const face = document.createElement('div');
      face.className = 'face';
      face.style.backgroundImage = `url("${src}")`;
      card.append(face);
      tile.append(card);
      board.append(tile);
      tiles.push({ tile, card, face, src, flipping: false });
    }

    function activeImageSet(excludeIndexes = []) {
      const skip = new Set(excludeIndexes);
      return new Set(tiles.filter((_, i) => !skip.has(i)).map(t => t.src));
    }

    function pickReplacement(pool, excludeSet) {
      const candidates = pool.filter(src => !excludeSet.has(src));
      if (!candidates.length) return null;
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function flipTo(tileState, nextSrc, duration) {
      if (tileState.flipping || tileState.src === nextSrc) return;
      tileState.flipping = true;
      tileState.card.style.animationDuration = `${duration}ms`;
      tileState.tile.classList.add('is-flipping');
      window.setTimeout(() => {
        tileState.face.style.backgroundImage = `url("${nextSrc}")`;
        tileState.src = nextSrc;
      }, duration / 2);
      window.setTimeout(() => {
        tileState.tile.classList.remove('is-flipping');
        tileState.flipping = false;
      }, duration + 20);
    }

    function scheduleNext(pool) {
      const delay = randomInt(CONFIG.minRefreshDelay, CONFIG.maxRefreshDelay);
      window.setTimeout(() => refreshTiles(pool), delay);
    }

    function refreshTiles(pool) {
      const changeCount = randomInt(CONFIG.minTilesPerRefresh, CONFIG.maxTilesPerRefresh);
      const indexes = shuffle([...Array(tiles.length).keys()]).slice(0, changeCount);
      const baseActive = activeImageSet(indexes);
      const picked = new Set();

      indexes.forEach(index => {
        const nextSrc = pickReplacement(pool, new Set([...baseActive, ...picked]));
        if (!nextSrc) return;
        picked.add(nextSrc);
        flipTo(tiles[index], nextSrc, randomInt(CONFIG.minFlipDuration, CONFIG.maxFlipDuration));
      });

      scheduleNext(pool);
    }

    async function init() {
      const candidates = buildCandidateUrls();
      const loaded = await preloadImages(candidates);

      // 실제로 로딩에 성공한 파일만 풀에 남김
      const pool = loaded.filter(item => item.ok).map(item => item.url);

      if (pool.length === 0) {
        loading.textContent = '이미지를 찾을 수 없습니다. images/01~99.(jpg/jpeg/png/gif) 를 확인해 주세요.';
        return;
      }

      if (pool.length < CONFIG.totalTiles) {
        loading.textContent = `사용 가능한 이미지 ${pool.length}장. 타일 ${CONFIG.totalTiles}개 중 일부는 반복 사용됩니다.`;
      }

      const starter = shuffle(pool);
      for (let i = 0; i < CONFIG.totalTiles; i++) {
        createTile(starter[i % starter.length]);
      }

      loading.classList.add('hidden');
      scheduleNext(pool);
    }

    init();
  </script>
</body>
</html>
